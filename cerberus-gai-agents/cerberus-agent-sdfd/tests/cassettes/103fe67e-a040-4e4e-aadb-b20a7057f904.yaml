03e","\u003cspan class=\"pl-s\"\u003e        Chase - Forbes\u0026quot;,\u0026quot;url\u0026quot;:\u0026quot;https://www.forbes.com/profile/harrison-chase/\u0026quot;,\u0026quot;content\u0026quot;:\u0026quot;Harrison\u003c/span\u003e","\u003cspan class=\"pl-s\"\u003e        Chase only cofounded LangChain in late 2022, but the company caught instant\u003c/span\u003e","\u003cspan class=\"pl-s\"\u003e        attention for enabling anyone to build apps powered by large language models\u003c/span\u003e","\u003cspan class=\"pl-s\"\u003e        like GPT-4 in as little as two\u0026quot;,\u0026quot;score\u0026quot;:0.9977743,\u0026quot;raw_content\u0026quot;:null},{\u0026quot;title\u0026quot;:\u0026quot;LangChain\u003c/span\u003e","\u003cspan class=\"pl-s\"\u003e        - Wikipedia\u0026quot;,\u0026quot;url\u0026quot;:\u0026quot;https://en.wikipedia.org/wiki/LangChain\u0026quot;,\u0026quot;content\u0026quot;:\u0026quot;In\u003c/span\u003e","\u003cspan class=\"pl-s\"\u003e        October 2023 LangChain introduced LangServe, a deployment tool designed to\u003c/span\u003e","\u003cspan class=\"pl-s\"\u003e        facilitate the transition from LCEL (LangChain Expression Language) prototypes\u003c/span\u003e","\u003cspan class=\"pl-s\"\u003e        to production-ready applications.[5]\\nIntegrations[edit]\\nAs of March 2023,\u003c/span\u003e","\u003cspan class=\"pl-s\"\u003e        LangChain included integrations with systems including Amazon, Google, and\u003c/span\u003e","\u003cspan class=\"pl-s\"\u003e        Microsoft Azure cloud storage; API wrappers for news, movie information, and\u003c/span\u003e","\u003cspan class=\"pl-s\"\u003e        weather; Bash for summarization, syntax and semantics checking, and execution\u003c/span\u003e","\u003cspan class=\"pl-s\"\u003e        of shell scripts; multiple web scraping subsystems and templates; few-shot\u003c/span\u003e","\u003cspan class=\"pl-s\"\u003e        learning prompt generation support; finding and summarizing \\\u0026quot;todo\\\u0026quot; tasks\u003c/span\u003e","\u003cspan class=\"pl-s\"\u003e        in code; Google Drive documents, spreadsheets, and presentations summarization,\u003c/span\u003e","\u003cspan class=\"pl-s\"\u003e        extraction, and creation; Google Search and Microsoft Bing web search; OpenAI,\u003c/span\u003e","\u003cspan class=\"pl-s\"\u003e        Anthropic, and Hugging Face language models; iFixit repair guides and wikis\u003c/span\u003e","\u003cspan class=\"pl-s\"\u003e        search and summarization; MapReduce for question answering, combining documents,\u003c/span\u003e","\u003cspan class=\"pl-s\"\u003e        and question generation; N-gram overlap scoring; PyPDF, pdfminer, fitz, and\u003c/span\u003e","\u003cspan class=\"pl-s\"\u003e        pymupdf for PDF file text extraction and manipulation; Python and JavaScript\u003c/span\u003e","\u003cspan class=\"pl-s\"\u003e        code generation, analysis, and debugging; Milvus vector database[6] to store\u003c/span\u003e","\u003cspan class=\"pl-s\"\u003e        and retrieve vector embeddings; Weaviate vector database[7] to cache embedding\u003c/span\u003e","\u003cspan class=\"pl-s\"\u003e        and data objects; Redis cache database storage; Python RequestsWrapper and\u003c/span\u003e","\u003cspan class=\"pl-s\"\u003e        other methods for API requests; SQL and NoSQL databases including JSON support;\u003c/span\u003e","\u003cspan class=\"pl-s\"\u003e        Streamlit, including for logging; text mapping for k-nearest neighbors search;\u003c/span\u003e","\u003cspan class=\"pl-s\"\u003e        time zone conversion and calendar operations; tracing and recording stack\u003c/span\u003e","\u003cspan class=\"pl-s\"\u003e        symbols in threaded and asynchronous subprocess runs; and the Wolfram Alpha\u003c/span\u003e","\u003cspan class=\"pl-s\"\u003e        website and SDK.[8] As a language model integration framework, LangChain\u003cspan class=\"pl-cce\"\u003e\u0026#39;\u0026#39;\u003c/span\u003es\u003c/span\u003e","\u003cspan class=\"pl-s\"\u003e        use-cases largely overlap with those of language models in general, including\u003c/span\u003e","\u003cspan class=\"pl-s\"\u003e        document analysis and summarization, chatbots, and code analysis.[2]\\nHistory[edit]\\nLangChain\u003c/span\u003e","\u003cspan class=\"pl-s\"\u003e        was launched in October 2022 as an open source project by Harrison Chase,\u003c/span\u003e","\u003cspan class=\"pl-s\"\u003e        while working at machine learning startup Robust Intelligence. In April 2023,\u003c/span\u003e","\u003cspan class=\"pl-s\"\u003e        LangChain had incorporated and the new startup raised over $20 million in\u003c/span\u003e","\u003cspan class=\"pl-s\"\u003e        funding at a valuation of at least $200 million from venture firm Sequoia\u003c/span\u003e","\u003cspan class=\"pl-s\"\u003e        Capital, a week after announcing a $10 million seed investment from Benchmark.[3][4]\\n\u003c/span\u003e","\u003cspan class=\"pl-s\"\u003e        The project quickly garnered popularity, with improvements from hundreds of\u003c/span\u003e","\u003cspan class=\"pl-s\"\u003e        contributors on GitHub, trending discussions on Twitter, lively activity on\u003c/span\u003e","\u003cspan class=\"pl-s\"\u003e        the project\u003cspan class=\"pl-cce\"\u003e\u0026#39;\u0026#39;\u003c/span\u003es Discord server, many YouTube tutorials, and meetups in San\u003c/span\u003e","\u003cspan class=\"pl-s\"\u003e        Francisco and London. As of April 2023, it can read from more than 50 document\u003c/span\u003e","\u003cspan class=\"pl-s\"\u003e        types and data sources.[9]\\nReferences[edit]\\nExternal links[edit]\u0026quot;,\u0026quot;score\u0026quot;:0.99694854,\u0026quot;raw_content\u0026quot;:null},{\u0026quot;title\u0026quot;:\u0026quot;Harrison\u003c/span\u003e","\u003cspan class=\"pl-s\"\u003e        Chase - CEO of LangChain - Analytics India Magazine\u0026quot;,\u0026quot;url\u0026quot;:\u0026quot;https://analy