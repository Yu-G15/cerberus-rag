ass=\"pl-s\"\u003e      includes heading the Machine Learning team at Robust Intelligence, focusing\u003c/span\u003e","\u003cspan class=\"pl-s\"\u003e      on the testing and validation of machine learning models, and leading the entity\u003c/span\u003e","\u003cspan class=\"pl-s\"\u003e      linking team at Kensho\\\u0026quot;}, {\\\u0026quot;url\\\u0026quot;: \\\u0026quot;https://techcrunch.com/author/harrison-chase/\\\u0026quot;,\u003c/span\u003e","\u003cspan class=\"pl-s\"\u003e      \\\u0026quot;content\\\u0026quot;: \\\u0026quot;Harrison Chase is the CEO and co-founder of LangChain, a company\u003c/span\u003e","\u003cspan class=\"pl-s\"\u003e      formed around the open source Python/Typescript packages that aim to make it\u003c/span\u003e","\u003cspan class=\"pl-s\"\u003e      easy to develop Language Model applications\\\u0026quot;}, {\\\u0026quot;url\\\u0026quot;: \\\u0026quot;https://www.sequoiacap.com/podcast/training-data-harrison-chase/\\\u0026quot;,\u003c/span\u003e","\u003cspan class=\"pl-s\"\u003e      \\\u0026quot;content\\\u0026quot;: \\\u0026quot;Sonya Huang: Hi, and welcome to training data. We have with us\u003c/span\u003e","\u003cspan class=\"pl-s\"\u003e      today Harrison Chase, founder and CEO of LangChain. Harrison is a legend in\u003c/span\u003e","\u003cspan class=\"pl-s\"\u003e      the agent ecosystem, as the product visionary who first connected LLMs with\u003c/span\u003e","\u003cspan class=\"pl-s\"\u003e      tools and actions. And LangChain is the most popular agent building framework\u003c/span\u003e","\u003cspan class=\"pl-s\"\u003e      in the AI space.\\\u0026quot;}, {\\\u0026quot;url\\\u0026quot;: \\\u0026quot;https://www.youtube.com/watch?v=7D8bw_4hTdo\\\u0026quot;,\u003c/span\u003e","\u003cspan class=\"pl-s\"\u003e      \\\u0026quot;content\\\u0026quot;: \\\u0026quot;Join us for an insightful interview with Harrison Chase, the\u003c/span\u003e","\u003cspan class=\"pl-s\"\u003e      CEO and co-founder of Langchain, as he provides a comprehensive overview of\u003c/span\u003e","\u003cspan class=\"pl-s\"\u003e      Langchain\u003cspan class=\"pl-cce\"\u003e\u0026#39;\u0026#39;\u003c/span\u003es innovati\\\u0026quot;}, {\\\u0026quot;url\\\u0026quot;: \\\u0026quot;https://www.forbes.com/profile/harrison-chase/\\\u0026quot;,\u003c/span\u003e","\u003cspan class=\"pl-s\"\u003e      \\\u0026quot;content\\\u0026quot;: \\\u0026quot;Harrison Chase only cofounded LangChain in late 2022, but the\u003c/span\u003e","\u003cspan class=\"pl-s\"\u003e      company caught instant attention for enabling anyone to build apps powered by\u003c/span\u003e","\u003cspan class=\"pl-s\"\u003e      large language models like GPT-4 in as little as two\\\u0026quot;}, {\\\u0026quot;url\\\u0026quot;: \\\u0026quot;https://en.wikipedia.org/wiki/LangChain\\\u0026quot;,\u003c/span\u003e","\u003cspan class=\"pl-s\"\u003e      \\\u0026quot;content\\\u0026quot;: \\\u0026quot;In October 2023 LangChain introduced LangServe, a deployment\u003c/span\u003e","\u003cspan class=\"pl-s\"\u003e      tool designed to facilitate the transition from LCEL (LangChain Expression Language)\u003c/span\u003e","\u003cspan class=\"pl-s\"\u003e      prototypes to production-ready applications.[5]\\\\nIntegrations[edit]\\\\nAs of\u003c/span\u003e","\u003cspan class=\"pl-s\"\u003e      March 2023, LangChain included integrations with systems including Amazon, Google,\u003c/span\u003e","\u003cspan class=\"pl-s\"\u003e      and Microsoft Azure cloud storage; API wrappers for news, movie information,\u003c/span\u003e","\u003cspan class=\"pl-s\"\u003e      and weather; Bash for summarization, syntax and semantics checking, and execution\u003c/span\u003e","\u003cspan class=\"pl-s\"\u003e      of shell scripts; multiple web scraping subsystems and templates; few-shot learning\u003c/span\u003e","\u003cspan class=\"pl-s\"\u003e      prompt generation support; finding and summarizing \\\\\\\u0026quot;todo\\\\\\\u0026quot; tasks in code;\u003c/span\u003e","\u003cspan class=\"pl-s\"\u003e      Google Drive documents, spreadsheets, and presentations summarization, extraction,\u003c/span\u003e","\u003cspan class=\"pl-s\"\u003e      and creation; Google Search and Microsoft Bing web search; OpenAI, Anthropic,\u003c/span\u003e","\u003cspan class=\"pl-s\"\u003e      and Hugging Face language models; iFixit repair guides and wikis search and\u003c/span\u003e","\u003cspan class=\"pl-s\"\u003e      summarization; MapReduce for question answering, combining documents, and question\u003c/span\u003e","\u003cspan class=\"pl-s\"\u003e      generation; N-gram overlap scoring; PyPDF, pdfminer, fitz, and pymupdf for PDF\u003c/span\u003e","\u003cspan class=\"pl-s\"\u003e      file text extraction and manipulation; Python and JavaScript code generation,\u003c/span\u003e","\u003cspan class=\"pl-s\"\u003e      analysis, and debugging; Milvus vector database[6] to store and retrieve vector\u003c/span\u003e","\u003cspan class=\"pl-s\"\u003e      embeddings; Weaviate vector database[7] to cache embedding and data objects;\u003c/span\u003e","\u003cspan class=\"pl-s\"\u003e      Redis cache database storage; Python RequestsWrapper and other methods for API\u003c/span\u003e","\u003cspan class=\"pl-s\"\u003e      requests; SQL and NoSQL databases including JSON support; Streamlit, including\u003c/span\u003e","\u003cspan class=\"pl-s\"\u003e      for logging; text mapping for k-nearest neighbors search; time zone conversion\u003c/span\u003e","\u003cspan class=\"pl-s\"\u003e      and calendar operations; tracing and recording stack symbols in threaded and\u003c/span\u003e","\u003cspan class=\"pl-s\"\u003e      asynchronous subprocess runs; and the Wolfram Alpha website and SDK.[8] As a\u003c/span\u003e","\u003cspan class=\"pl-s\"\u003e      language model integration framework, LangChain\u003cspan class=\"pl-cce\"\u003e\u0026#39;\u0026#39;\u003c/span\u003es use-cases largely overlap\u003c/span\u003e","\u003cspan class=\"pl-s\"\u003e      with those of language models in general, including document analysis and summarization,\u003c/span\u003e","\u003cspan class=\"pl-s\"\u003e      chatbots, and code analysis.[2]\\\\nHistory[edit]\\\\nLangChain was launched in\u003c/span\u003e","\u003cspan class=\"pl-s\"\u003e      October 2022 as an open source project by Harrison Chase, while working at machine\u003c/span\u003e","\u003cspan class=\"pl-s\"\u003e      learning startup Robust Intelligence. In April 2023, LangChain had incorporated\u003c/span\u003e","\u003cspan class=\"pl-s\"\u003e      and the new startup raised over $20 million in funding at a valuation of at\u003c/span\u003e","\u003cspan class=\"pl-s\"\u003e      least $200 million from venture firm Sequoia Capital, a week after announcing\u003c/span\u003e","\u003cspan class=\"pl-s\"\u003e      a $10 million seed investment from Benchmark.[3][4]\\\\n The project quickly garnered\u003c/span\u003e","\u003cspan class=\"pl-s\"\u003e      popularity, with improvements from hundreds of contributors on GitHub, trending\u003c/span\u003e","\u003cspan class=\"pl-s\"\u003e      discussions on Twitter, lively activity on the project\u003cspan class=\"pl-cce\"\u003e\u0026#39;\u0026#39;\u003c/span\u003es Discord server, many\u003c/span\u003e","\u003cspan class=\"pl-s\"\u003e      YouTube tutorials, and meetups in San Francisco and London. As of April 2023,\u003c/span\u003e","\u003cspan class=\"pl-s\"\u003e      it can read from more than 50 document types and data sources.[9]\\\\nReferences[edit]\\\\nExternal\u003c/span\u003e","\u003cspan class=\"pl-s\"\u003e      links[edit]\\\u0026quot;}, {\\\u0026quot;url\\\u0026quot;: \\\u0026quot;https://analyticsindiamag.com/people/harrison-chase/\\\u0026quot;,\u003c/span\u003e","\u003cspan class=\"pl-s\"\u003e      \\\u0026quot;content\\\u0026quot;: \\\u0026quot;By AIM The dynamic co-founder and CEO of LangChain, Harrison\u003c/span\u003e","\u003cspan class=\"pl-s\"\u003e      Chase is simplifying the creation of applications powered by LLMs. With a background\u003c/span\u003e","\u003cspan class=\"pl-s\"\u003e      in statistics and computer science from Harvard University, Chase has carved\u003c/span\u003e","\u003cspan class=\"pl-s\"\u003e      a niche in the AI landscape. AIM Brand Solutions, a marketing division within\u003c/span\u003e","\u003cspan class=\"pl-s\"\u003e      AIM, specializes in creating diverse content such as documentaries, public artworks,\u003c/span\u003e","\u003cspan class=\"pl-s\"\u003e      podcasts, videos, articles, and more to effectively tell compelling stories.\u003c/span\u003e","\u003cspan class=\"pl-s\"\u003e      AIM Research produces a series of annual reports on AI \u0026amp; Data Science covering\u003c/span\u003e","\u003cspan class=\"pl-s\"\u003e      every aspect of the industry. Discover how Cypher 2024 expands to the USA, bridging\u003c/span\u003e","\u003cspan class=\"pl-s\"\u003e      AI innovation gaps and tackling the challenges of enterprise AI adoption AIM\u003c/span\u003e","\u003cspan class=\"pl-s\"\u003e      India AIM Research AIM Leaders Council 50 Best Data Science Firms\\\u0026quot;}, {\\\u0026quot;url\\\u0026quot;:\u003c/span\u003e","\u003cspan class=\"pl-s\"\u003e      \\\u0026quot;https://www.turingpost.com/p/harrison-chase-langchain-ai-agents\\\u0026quot;, \\\u0026quot;content\\\u0026quot;:\u003c/span\u003e","\u003cspan class=\"pl-s\"\u003e      \\\u0026quot;Harrison Chase, founder of LangChain, shared insights on the evolution of\u003c/span\u003e","\u003cspan class=\"pl-s\"\u003e      AI agents and their applications during Sequoia Capital\u003cspan class=\"pl-cce\"\u003e\u0026#39;\u0026#39;\u003c/span\u003es AI Ascent. ... Saves\u003c/span\u003e","\u003cspan class=\"pl-s\"\u003e      you a lot of research time, plus gives a flashback to ML history and insights\u003c/span\u003e","\u003cspan class=\"pl-s\"\u003e      into the future. Stay ahead alongside over 73,000 professionals from top AI\u003c/span\u003e","\u003cspan class=\"pl-s\"\u003e      