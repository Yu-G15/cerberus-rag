version: "3.9"
name: cerberus-suite

networks:
  cerberus-net: {}

volumes:
  neo4j_data: {}
  neo4j_logs: {}

services:
  neo4j:
    image: neo4j:5.22
    restart: unless-stopped
    environment:
      NEO4J_AUTH: ${NEO4J_USERNAME}/${NEO4J_PASSWORD}
      NEO4J_dbms_memory_heap_initial__size: 512M
      NEO4J_dbms_memory_heap_max__size: 1G
      NEO4J_server_memory_pagecache_size: 512M
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "echo 'RETURN 1' | cypher-shell -a bolt://localhost:7687 -u \"$NEO4J_USERNAME\" -p \"$NEO4J_PASSWORD\" >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s
    networks:
      - cerberus-net

  cerberus-ms-rest:
    build:
      context: ./cerberus-ms-rest
      dockerfile: Dockerfile.txt
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: cerberus_ms_rest.settings
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USERNAME: ${NEO4J_USERNAME}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
    depends_on:
      neo4j:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./cerberus-ms-rest:/app
    command: ["sh", "-lc", "python manage.py check && exec python manage.py runserver 0.0.0.0:8000"]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0) if urllib.request.urlopen('http://127.0.0.1:8000/healthz/').getcode()==200 else sys.exit(1)"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 60s
    networks:
      - cerberus-net

  cerberus-rag:
    build:
      context: ./cerberus-rag
      dockerfile: Dockerfile.txt
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USERNAME: ${NEO4J_USERNAME}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    depends_on:
      neo4j:
        condition: service_healthy
    ports:
      - "8002:8002"
    volumes:
      - ./cerberus-rag:/app
    command: ["python", "-m", "uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8002"]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0) if urllib.request.urlopen('http://127.0.0.1:8002/healthz').getcode()==200 else sys.exit(1)"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 60s
    networks:
      - cerberus-net


  cerberus-gai-agents:
    build:
      context: ./cerberus-gai-agents
      dockerfile: Dockerfile.txt
    restart: unless-stopped
    env_file:
      - .env
    environment:
      RAG_BASE_URL: http://cerberus-rag:8002
      RAG_PATH: /query
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    depends_on:
      cerberus-rag:
        condition: service_healthy
    ports:
      - "8001:8001"
    volumes:
      - ./cerberus-gai-agents:/app
    command: ["python", "-m", "uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8001"]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0) if urllib.request.urlopen('http://127.0.0.1:8001/healthz').getcode()==200 else sys.exit(1)"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 60s

    networks:
      - cerberus-net
